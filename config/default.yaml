models:
  toxicity: unitary/toxic-bert
  nli: cross-encoder/nli-deberta-v3-small
  similarity: all-MiniLM-L6-v2
  spacy: en_core_web_sm
  use_ml_models: true

trust_weights:
  bias: 0.35
  factuality: 0.40
  fairness: 0.25

domain_weights:
  general:
    bias: 0.35
    factuality: 0.40
    fairness: 0.25
  medical:
    bias: 0.20
    factuality: 0.65
    fairness: 0.15
  hiring:
    bias: 0.30
    factuality: 0.30
    fairness: 0.40

trust_blend_additive: 0.35

trust_caps:
  zero_factuality_threshold: 0.01
  zero_factuality_with_context: 25
  all_claims_contradicted: 20
  low_factuality_threshold: 0.15
  low_factuality_cap: 35
  severe_bias_threshold: 0.65
  severe_bias_cap: 30
  severe_fairness_threshold: 0.75
  severe_fairness_cap: 25

thresholds:
  toxicity_high: 0.7
  nli_contradiction: 0.45
  nli_entailment: 0.55
  similarity_min: 0.55
  bias_flag_span: 0.6

heuristics:
  fake_citation_pattern: '\[\d+\]|\(et al\.\)|according to a \d{4} study'
  vague_number_pattern: '\b\d{1,3}%\b|\b\d+\s*(million|billion)\b'
